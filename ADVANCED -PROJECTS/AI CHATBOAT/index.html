<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Boat Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #e0f7fa;
            color: #01579b;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #0277bd;
        }

        .boat-scene {
            height: 200px;
            background: linear-gradient(to bottom, #4fc3f7, #0288d1);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .boat {
            position: absolute;
            bottom: 30px;
            left: 50%;
            width: 100px;
            height: 60px;
            transform: translateX(-50%);
            animation: rock 3s ease-in-out infinite;
        }

        .boat-body {
            width: 100px;
            height: 20px;
            background: #5d4037;
            border-radius: 10px 10px 0 0;
            position: absolute;
            bottom: 0;
        }

        .mast {
            width: 4px;
            height: 50px;
            background: #5d4037;
            position: absolute;
            bottom: 20px;
            left: 50px;
        }

        .sail {
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 0px solid transparent;
            border-bottom: 60px solid #ffffff;
            position: absolute;
            bottom: 50px;
            left: 54px;
            animation: sail 4s ease-in-out infinite;
        }

        .wave {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 50px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg"><path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" fill="%230288d1" opacity=".25"/></svg>');
            background-repeat: repeat-x;
            animation: wave 10s linear infinite;
        }

        .chat-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user-message {
            background: #e3f2fd;
            margin-left: auto;
        }

        .bot-message {
            background: #bbdefb;
            margin-right: auto;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #b3e5fc;
            border-radius: 5px;
        }

        #send-btn {
            padding: 10px 20px;
            background: #0288d1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #send-btn:hover {
            background: #0277bd;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes rock {
            0%, 100% { transform: translateX(-50%) rotate(-5deg); }
            50% { transform: translateX(-50%) rotate(5deg); }
        }

        @keyframes sail {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Boat Assistant</h1>
        
        <div class="boat-scene">
            <div class="wave"></div>
            <div class="boat">
                <div class="mast"></div>
                <div class="sail"></div>
                <div class="boat-body"></div>
            </div>
        </div>
        
        <div class="chat-container">
            <div class="chat-box" id="chat-box">
                <div class="message bot-message">
                    Ahoy there! I'm your AI Boat Assistant. Ask me about sailing, weather, or anything boat-related!
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type your question here..." autofocus>
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatBox = document.getElementById('chat-box');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            
            // Handle sending messages
            function sendMessage() {
                const message = userInput.value.trim();
                if (message === '') return;
                
                // Add user message to chat
                addMessage(message, 'user');
                userInput.value = '';
                
                // Get AI response
                setTimeout(() => {
                    const response = getAIResponse(message);
                    addMessage(response, 'bot');
                    
                    // Scroll to bottom
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 500);
            }
            
            // Add message to chat box
            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.classList.add(sender + '-message');
                messageDiv.textContent = text;
                chatBox.appendChild(messageDiv);
            }
            
            // Generate AI response
            function getAIResponse(question) {
                const lowerQuestion = question.toLowerCase();
                
                // Sailing questions
                if (lowerQuestion.includes('sail') || lowerQuestion.includes('boat')) {
                    return "Sailing is the art of controlling a boat using the wind. The key is to position your sails correctly relative to the wind direction.";
                }
                
                // Weather questions
                if (lowerQuestion.includes('weather') || lowerQuestion.includes('wind')) {
                    return "For sailing, you want steady winds between 5-20 knots. Avoid storms and check weather forecasts before heading out.";
                }
                
                // Safety questions
                if (lowerQuestion.includes('safe') || lowerQuestion.includes('danger')) {
                    return "Always wear life jackets, check your equipment, and let someone know your sailing plan. Safety first!";
                }
                
                // Direction questions
                if (lowerQuestion.includes('direction') || lowerQuestion.includes('navigate')) {
                    return "Use a compass and nautical charts. The wind direction determines how you should position your sails.";
                }
                
                // Maintenance questions
                if (lowerQuestion.includes('maintain') || lowerQuestion.includes('care')) {
                    return "Regularly check your boat for damage, clean the hull, and service the engine if you have one. Saltwater is corrosive!";
                }
                
                // Greetings
                if (lowerQuestion.includes('hello') || lowerQuestion.includes('hi')) {
                    return "Ahoy there! Ready to set sail? What can I help you with today?";
                }
                
                // Default response
                return "I'm an AI specialized in boating and sailing. Can you ask me something more specific about boats or sailing?";
            }
            
            // Event listeners
            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
