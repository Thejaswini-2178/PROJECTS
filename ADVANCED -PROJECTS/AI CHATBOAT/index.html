<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <style>
        :root {
            --primary: #10a37f;
            --bg-color: #ffffff;
            --user-bg: #f7f7f8;
            --bot-bg: #ffffff;
            --text-color: #343541;
            --border-color: #d9d9e3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            scroll-behavior: smooth;
        }

        .message {
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 8px;
            max-width: 85%;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        .user-message {
            background-color: var(--user-bg);
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .bot-message {
            background-color: var(--bot-bg);
            border: 1px solid var(--border-color);
            margin-right: auto;
            border-bottom-left-radius: 0;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px 0;
            border-top: 1px solid var(--border-color);
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        #user-input:focus {
            border-color: var(--primary);
        }

        #send-btn {
            padding: 12px 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background-color: #0d8a6a;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 5px;
            padding: 12px 16px;
            background-color: var(--bot-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #666;
            border-radius: 50%;
            animation: typingAnimation 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes typingAnimation {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        @media (max-width: 600px) {
            .chat-container {
                padding: 10px;
            }
            
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>AI Chat Assistant</h1>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                Hello! I'm your AI assistant. How can I help you today?
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." autofocus>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatMessages = document.getElementById('chat-messages');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            
            // Improved AI response system
            const aiResponses = {
                greetings: {
                    patterns: [/hello|hi|hey/i, /good (morning|afternoon|evening)/i],
                    responses: [
                        "Hello! How can I assist you today?",
                        "Hi there! What can I do for you?",
                        "Greetings! How may I help you?"
                    ]
                },
                identity: {
                    patterns: [/who are you/i, /what are you/i, /your name/i],
                    responses: [
                        "I'm an AI chat assistant designed to help answer your questions.",
                        "I'm a virtual assistant here to provide information and assistance.",
                        "You can think of me as a digital helper ready to assist with your queries."
                    ]
                },
                time: {
                    patterns: [/time|date|day/i],
                    responses: [
                        `The current time is ${new Date().toLocaleTimeString()} on ${new Date().toLocaleDateString()}.`,
                        `Today is ${new Date().toLocaleDateString()} and the time is ${new Date().toLocaleTimeString()}.`
                    ]
                },
                math: {
                    patterns: [/calculate|what is (\d+ [\+\-\*\/] \d+)/i, /math|equation/i],
                    responses: (question) => {
                        const mathExpr = question.match(/\d+ [\+\-\*\/] \d+/);
                        if (mathExpr) {
                            try {
                                const result = eval(mathExpr[0]);
                                return `The result of ${mathExpr[0]} is ${result}.`;
                            } catch {
                                return "I couldn't calculate that. Please try a simpler equation.";
                            }
                        }
                        return "I can help with math calculations. Try asking something like 'What is 5 + 7?'";
                    }
                },
                default: {
                    responses: [
                        "I'm not sure I understand. Could you rephrase that?",
                        "I'm still learning. Could you ask that differently?",
                        "I don't have that information right now. Is there something else I can help with?"
                    ]
                }
            };
            
            // Add message to chat
            const addMessage = (text, sender) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                messageDiv.textContent = text;
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            };
            
            // Show typing indicator
            const showTyping = () => {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'typing-indicator';
                typingDiv.innerHTML = `
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                `;
                chatMessages.appendChild(typingDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                return typingDiv;
            };
            
            // Get AI response
            const getAIResponse = (question) => {
                for (const [category, data] of Object.entries(aiResponses)) {
                    if (category === 'default') continue;
                    
                    for (const pattern of data.patterns) {
                        if (pattern.test(question)) {
                            if (typeof data.responses === 'function') {
                                return data.responses(question);
                            }
                            return data.responses[Math.floor(Math.random() * data.responses.length)];
                        }
                    }
                }
                
                return aiResponses.default.responses[
                    Math.floor(Math.random() * aiResponses.default.responses.length)
                ];
            };
            
            // Handle sending messages
            const handleSend = () => {
                const message = userInput.value.trim();
                if (!message) return;
                
                addMessage(message, 'user');
                userInput.value = '';
                
                const typingIndicator = showTyping();
                
                setTimeout(() => {
                    chatMessages.removeChild(typingIndicator);
                    const response = getAIResponse(message);
                    addMessage(response, 'bot');
                }, 1000 + Math.random() * 1000);
            };
            
            // Event listeners
            sendBtn.addEventListener('click', handleSend);
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSend();
            });
        });
    </script>
</body>
</html>
