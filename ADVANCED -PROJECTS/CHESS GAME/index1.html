<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chess Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="chess-container">
        <div class="game-info">
            <div class="player white-player">
                <span class="player-name">White</span>
                <span class="player-time" id="white-time">10:00</span>
            </div>
            <div class="game-controls">
                <button id="new-game-btn"><i class="fas fa-plus-circle"></i> New Game</button>
                <button id="flip-board-btn"><i class="fas fa-sync-alt"></i> Flip Board</button>
            </div>
            <div class="player black-player">
                <span class="player-name">Black</span>
                <span class="player-time" id="black-time">10:00</span>
            </div>
        </div>
        
        <div class="chessboard" id="chessboard"></div>
        
        <div class="move-history">
            <h3>Move History</h3>
            <div class="moves" id="move-history"></div>
        </div>
        
        <div class="status-bar" id="status-bar">White's turn</div>
    </div>

    <div class="promotion-modal" id="promotion-modal">
        <div class="promotion-options">
            <h3>Promote to:</h3>
            <div class="options">
                <div class="option" data-piece="queen"><i class="fas fa-chess-queen"></i> Queen</div>
                <div class="option" data-piece="rook"><i class="fas fa-chess-rook"></i> Rook</div>
                <div class="option" data-piece="bishop"><i class="fas fa-chess-bishop"></i> Bishop</div>
                <div class="option" data-piece="knight"><i class="fas fa-chess-knight"></i> Knight</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
