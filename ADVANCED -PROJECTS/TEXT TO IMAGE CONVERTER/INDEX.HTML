<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Image Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            margin-bottom: 10px;
            transition: border 0.3s;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 30px;
            display: none;
        }

        .image-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .generated-image {
            width: 100%;
            max-width: 350px;
            border-radius: 5px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .generated-image:hover {
            transform: scale(1.02);
        }

        .loading {
            text-align: center;
            margin: 20px 0;
            display: none;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid #3498db;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #e74c3c;
            background-color: #fadbd8;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .settings {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .settings h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .settings-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .setting {
            flex: 1;
        }

        .api-key-container {
            margin-bottom: 20px;
        }

        .api-key-input {
            display: flex;
            gap: 10px;
        }

        .api-key-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .save-key {
            background-color: #27ae60;
            padding: 0 15px;
            border-radius: 5px;
            color: white;
            border: none;
            cursor: pointer;
        }

        .save-key:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Text to Image Generator</h1>
        
        <div class="api-key-container">
            <label for="api-key">OpenAI API Key</label>
            <div class="api-key-input">
                <input type="password" id="api-key" placeholder="Enter your OpenAI API key">
                <button class="save-key" id="save-key">Save</button>
            </div>
            <p style="margin-top: 8px; font-size: 14px; color: #7f8c8d;">
                Your API key is stored locally in your browser and never sent to our servers.
                <a href="https://platform.openai.com/api-keys" target="_blank" style="color: #3498db;">Get your API key</a>
            </p>
        </div>

        <div class="input-group">
            <label for="prompt">Image Prompt</label>
            <textarea id="prompt" placeholder="Describe the image you want to generate..."></textarea>
        </div>

        <div class="settings">
            <h3>Generation Settings</h3>
            <div class="settings-group">
                <div class="setting">
                    <label for="size">Image Size</label>
                    <select id="size">
                        <option value="256x256">256x256</option>
                        <option value="512x512" selected>512x512</option>
                        <option value="1024x1024">1024x1024</option>
                    </select>
                </div>
                <div class="setting">
                    <label for="quality">Quality</label>
                    <select id="quality">
                        <option value="standard" selected>Standard</option>
                        <option value="hd">HD</option>
                    </select>
                </div>
            </div>
            <div class="settings-group">
                <div class="setting">
                    <label for="style">Style</label>
                    <select id="style">
                        <option value="vivid" selected>Vivid</option>
                        <option value="natural">Natural</option>
                    </select>
                </div>
                <div class="setting">
                    <label for="count">Number of Images</label>
                    <select id="count">
                        <option value="1">1</option>
                        <option value="2" selected>2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
            </div>
        </div>

        <button id="generate-btn">Generate Image</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating your image... This may take a moment.</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <h2>Generated Images</h2>
            <div class="image-container" id="image-container"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Load saved API key if exists
            const savedApiKey = localStorage.getItem('openai-api-key');
            if (savedApiKey) {
                document.getElementById('api-key').value = savedApiKey;
            }

            // Save API key
            document.getElementById('save-key').addEventListener('click', function() {
                const apiKey = document.getElementById('api-key').value.trim();
                if (apiKey) {
                    localStorage.setItem('openai-api-key', apiKey);
                    alert('API key saved successfully!');
                } else {
                    alert('Please enter a valid API key');
                }
            });

            // Generate image
            document.getElementById('generate-btn').addEventListener('click', generateImage);

            async function generateImage() {
                const apiKey = document.getElementById('api-key').value.trim();
                const prompt = document.getElementById('prompt').value.trim();
                const size = document.getElementById('size').value;
                const quality = document.getElementById('quality').value;
                const style = document.getElementById('style').value;
                const count = parseInt(document.getElementById('count').value);

                // Validate inputs
                if (!apiKey) {
                    showError('Please enter your OpenAI API key');
                    return;
                }

                if (!prompt) {
                    showError('Please enter a prompt for the image');
                    return;
                }

                // Show loading state
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                document.getElementById('result').style.display = 'none';
                document.getElementById('generate-btn').disabled = true;

                try {
                    const response = await fetch('https://api.openai.com/v1/images/generations', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            prompt: prompt,
                            n: count,
                            size: size,
                            quality: quality,
                            style: style
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error?.message || 'Failed to generate image');
                    }

                    displayResults(data.data);
                } catch (error) {
                    showError(error.message);
                } finally {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('generate-btn').disabled = false;
                }
            }

            function displayResults(images) {
                const container = document.getElementById('image-container');
                container.innerHTML = '';

                images.forEach(image => {
                    const imgElement = document.createElement('img');
                    imgElement.src = image.url;
                    imgElement.alt = 'Generated image from prompt';
                    imgElement.className = 'generated-image';
                    container.appendChild(imgElement);
                });

                document.getElementById('result').style.display = 'block';
            }

            function showError(message) {
                const errorElement = document.getElementById('error');
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
        });
    </script>
</body>
</html>
