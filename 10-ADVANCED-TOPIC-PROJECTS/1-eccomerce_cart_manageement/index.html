<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Cart</title>
    <script defer src="app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-4">
        <div class=" mx-auto bg-white shadow-lg rounded-lg p-6">
            <h1 class="text-2xl font-bold mb-6 text-center">E-Commerce Cart</h1>

            <div class="grid grid-cols-2 gap-6">
                <!-- Product List Section -->
                <div>
                    <h2 class="text-xl font-semibold mb-4">Products</h2>
                    <!-- Search Input -->
                    <div class="mb-4">
                        <input id="search" type="text" placeholder="Search Products"
                            class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Product List -->
                    <div id="product-list" class="space-y-4"></div>
                </div>

                <!-- Cart Section -->
                <div>
                    <h2 class="text-xl font-semibold mb-4">Shopping Cart</h2>
                    <div id="cart-items" class="space-y-4"></div>
                    <div class="text-right font-bold mt-4">
                        Total: <span id="total-price">$0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Initialize cart
        const createCart = () => {
            let cart = [];
            let totalPrice = 0;

            return {
                addProduct: (product) => {
                    cart.push(product);
                    totalPrice += product.price;
                    saveCartToLocalStorage(cart);
                    renderCart(cart);
                },
                removeProduct: (productId) => {
                    cart = cart.filter((p) => p.id !== productId);
                    totalPrice = cart.reduce((sum, p) => sum + p.price, 0);
                    saveCartToLocalStorage(cart);
                    renderCart(cart);
                },
                getCart: () => cart,
                getTotalPrice: () => totalPrice,
            };
        };

        const cart = createCart();
        // LocalStorage utilities
        const saveCartToLocalStorage = (cart) => {
            localStorage.setItem("cart", JSON.stringify(cart));
        };

        const loadCartFromLocalStorage = () => {
            const cart = localStorage.getItem("cart");
            return cart ? JSON.parse(cart) : [];
        };

        // Render cart
        const renderCart = (cart) => {
            const cartItemsContainer = document.getElementById("cart-items");
            cartItemsContainer.innerHTML = ""; // Clear current items

            cart.forEach((item) => {
                cartItemsContainer.innerHTML += `
        <div class="flex justify-between items-center p-2 border-b">
          <span>${item.name}</span>
          <span>$${item.price}</span>
          <button class="text-red-500" onclick="cart.removeProduct(${item.id})">Remove</button>
        </div>
      `;
            });
            document.getElementById("total-price").textContent = `$${cart.reduce(
                (sum, item) => sum + item.price,
                0
            )}`;
        };
        // Fetch and display products
        const fetchProducts = async () => {
            try {
                const response = await fetch("https://fakestoreapi.com/products");
                if (!response.ok) throw new Error("Failed to fetch products");
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.error("Error fetching products:", error.message);
            }
        };

        // Render product list
        const renderProducts = (products) => {
            const productList = document.getElementById("product-list");
            productList.innerHTML = "";

            products.forEach((product) => {
                productList.innerHTML += `
        <div class="flex justify-between items-center p-2 border rounded-lg">
          <span>${product.title}</span>
          <span>$${product.price}</span>
          <button class="bg-blue-500 text-white px-4 py-1 rounded" 
            onclick="cart.addProduct({ id: ${product.id}, name: '${product.title}', price: ${product.price} })">
            Add to Cart
          </button>
        </div>
      `;
            });
        };
        // Debouncing search
        const debounce = (func, delay) => {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), delay);
            };
        };

        const searchProducts = debounce(async (query) => {
            try {
                const response = await fetch(`https://fakestoreapi.com/products`);
                if (!response.ok) throw new Error("Failed to fetch products");
                const products = await response.json();
                const filteredProducts = products.filter((p) =>
                    p.title.toLowerCase().includes(query.toLowerCase())
                );
                renderProducts(filteredProducts);
            } catch (error) {
                console.error("Error during search:", error);
            }
        }, 300);

        // Event listeners
        document.getElementById("search").addEventListener("input", (e) => {
            searchProducts(e.target.value);
        });

        // Initial render
        document.addEventListener("DOMContentLoaded", () => {
            const storedCart = loadCartFromLocalStorage();
            renderCart(storedCart);
            fetchProducts();
        });
    </script>
</body>

</html>
